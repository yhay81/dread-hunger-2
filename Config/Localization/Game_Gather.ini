; Frostwake localization — GATHER pass.
; Native culture = English; cultures = en / ja / zh-Hans (Russian intentionally dropped 2026-05-29).
; Run: UnrealEditor-Cmd Frostwake.uproject -run=GatherText -config="Config/Localization/Game_Gather.ini" -unattended -nop4
; Produces Content/Localization/Game/<culture>/Game.archive (translations are then filled in, then Game_Compile.ini compiles .locres).
[CommonSettings]
SourcePath=Content/Localization/Game
DestinationPath=Content/Localization/Game
ManifestName=Game.manifest
ArchiveName=Game.archive
PortableObjectName=Game.po
ResourceName=Game.locres
NativeCulture=en
CulturesToGenerate=en
CulturesToGenerate=ja
CulturesToGenerate=zh-Hans

; Gather LOCTEXT / LOCTABLE source strings from the runtime module.
[GatherTextStep0]
CommandletClass=GatherTextFromSource
SearchDirectoryPaths=Source/Frostwake
FileNameFilters=*.cpp
FileNameFilters=*.h
FileNameFilters=*.inl
ShouldGatherFromEditorOnlyData=false

; Write manifest (source strings).
[GatherTextStep1]
CommandletClass=GenerateGatherManifest

; Write per-culture archives (translations get filled in after this).
[GatherTextStep2]
CommandletClass=GenerateGatherArchive
