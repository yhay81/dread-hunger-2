; Frostwake localization — COMPILE pass.
; Run after Game_Gather.ini and after the ja / zh-Hans archives have translations filled in.
; Run: UnrealEditor-Cmd Frostwake.uproject -run=GatherText -config="Config/Localization/Game_Compile.ini" -unattended -nop4
; Produces Content/Localization/Game/<culture>/Game.locres (the runtime-loaded compiled resource).
[CommonSettings]
SourcePath=Content/Localization/Game
DestinationPath=Content/Localization/Game
ManifestName=Game.manifest
ArchiveName=Game.archive
PortableObjectName=Game.po
ResourceName=Game.locres
NativeCulture=en
CulturesToGenerate=en
CulturesToGenerate=ja
CulturesToGenerate=zh-Hans

; Compile the (translated) archives into .locres.
[GatherTextStep0]
CommandletClass=GenerateTextLocalizationResource
